import groovy.json.JsonSlurper
import org.gradle.api.artifacts.component.ModuleComponentIdentifier

def policyPath = System.getenv('ESSENTIALS_DEPENDENCY_POLICY')
if (!policyPath) {
    throw new GradleException('ESSENTIALS_DEPENDENCY_POLICY must be set')
}

def policyFile = new File(policyPath)
if (!policyFile.isFile()) {
    throw new GradleException("Dependency policy not found: ${policyFile}")
}

def policy = new JsonSlurper().parse(policyFile) as Map<String, String>
def reportPath = System.getenv('ESSENTIALS_DEPENDENCY_REPORT')

gradle.beforeProject { project ->
    project.configurations.configureEach { configuration ->
        configuration.resolutionStrategy.eachDependency { details ->
            def requested = details.requested
            if (requested.group && requested.name) {
                def coordinate = "${requested.group}:${requested.name}"
                def requiredVersion = policy[coordinate]
                if (requiredVersion) {
                    details.useVersion(requiredVersion)
                    details.because('GrapheneOS Essentials suite dependency policy')
                }
            }
        }
        if (reportPath && configuration.name.toLowerCase().contains('release') &&
                configuration.name.toLowerCase().endsWith('runtimeclasspath')) {
            configuration.incoming.afterResolve {
                def coordinates = configuration.incoming.resolutionResult.allComponents.collectMany { component ->
                    def id = component.id
                    id instanceof ModuleComponentIdentifier ?
                        ["${id.group}:${id.module}\t${id.version}"] : []
                }.toSorted().unique()
                if (!coordinates.isEmpty()) {
                    def report = new File(reportPath)
                    report.parentFile.mkdirs()
                    report.withWriterAppend('UTF-8') { writer ->
                        coordinates.each { writer.println(it) }
                    }
                }
            }
        }
    }
}
