    - type: case
      normal: [Йҫ, "!fixedColumnOrder!5", "в—Ңрҗһ©|\U000107A9", Йҝ, К…, К®, КҜ]
      shifted: [ЗҖ, "!fixedColumnOrder!5", ЗҒМғ, ЗҖМғ, ЗҒ, ЗҖМ¬, ЗҒМ¬, "в—Ңрҗһ¶|\U000107B6", КҮ, "в—Ңрҗһ·|\U000107B7"]
    - type: case
      normal: [Й«, "в—Ңкӯһ|\uAB5E"]
      shifted: [Зғ, "!fixedColumnOrder!3", рқјҠ, вҖј, ПҲ, "в—Ңрҗһ№|\U000107B9", "в—Ңкңқ|\uA71D"]
    - type: case
      normal: [Йҗ, "в—Ңбө„|\u1D44"]
      shifted: [ЗӮ, "!fixedColumnOrder!3", ЗӮМ¬, ЗӮМғ, "в—Ңрҗһё|\U000107B8"]
    - type: case
      normal: [ЙӨ, ЙӨМһ, "в—Ңрҗһ‘|\U00010791"]
      shifted: [Й¶, "в—ҢрҗһЈ|\U000107A3"]
    - type: case
      normal: [Йө, "!fixedColumnOrder!3", "в—Ңб¶ұ|\u1DB1"]
      shifted: [ГҰ, "в—Ңрҗһғ|\U00010783"]
    - type: case
      normal: [Е“, "!fixedColumnOrder!3", "в—ҢрҗһЈ|\U000107A3", "в—Ңкҹ№|\uA7F9", Й¶]
      shifted: [Кү, "в—Ңб¶¶|\u1DB6"]
    - type: case
      normal: [К”, "!fixedColumnOrder!8", "в—Ңрҗһі|\U000107B3", "в—Ңрҗһҙ|\U000107B4", "в—ҢЛӨ|\u02E4", "в—ҢЛҖ|\u02C0", КЎКј, К•, Кў, КЎ]
