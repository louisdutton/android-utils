# This layout is an extension of the ipa_qwerty layout
# but with superscript for almost all characters in the IPA.

name: QWERTY More
numberRowMode: AlwaysDisabled # first row is the number row
autoShift: false # IPA is not bicameral
attributes:
  shiftable: false # prevent letters from being capitalised when pressing shift
  moreKeyMode: OnlyExplicit # prevent additional symbols from being added to long press list
rows:
  - letters: # X-SAMPA number row
    - type: case
      normal: [ЙЁ, "в—Ңб¶Ө|\u1DA4"]
      shifted: [Йё, "!fixedColumnOrder!3", ЙёКј, pЙё, "в—Ңб¶І|\u1DB2"]
    - type: case
      normal: [Гё, ГёМһ, "в—Ңрҗһў|\U000107A2"]
      shifted: [Йҷ, "!fixedColumnOrder!4", Йҳ, Йҡ, "в—ҢбөҠ|\u1D4A", "в—ҢрҗһҺ|\U0001078E"]
    - type: case
      normal: [Йң, "!fixedColumnOrder!3", Йқ, Йһ, Йӣ, "в—Ңб¶ҹ|\u1D9F", "в—ҢрҗһҸ|\U0001078F", "в—ҢбөӢ|\u1D4B"]
