      }
    - type: contextual
      fallbackKey: ˈ
    - $action
    - $space
    - [
        "◌ʰ|\u02B0",
        "!fixedColumnOrder!7",
        "◌ˤ|\u02E4",
        "◌ʲ|\u02B2",
        "◌̪|\u032A",
        "◌̥|\u0325",
        "◌̰|\u0330",
        "◌͡◌|\u0361",
        "◌͜◌|\u035C",
        "◌ˠ|\u02E0",
        "◌͆|\u0346",
        "◌̊|\u030A",
        "◌̤|\u0324",
        "◌̃|\u0303",
        "◌˞|\u02DE",
        "◌̬|\u032C",
      ]
