      - ["˨", "◌̀|\u0300"]
      - ["˩", "◌̏|\u030F"]
      - ["˩˥", "◌̌|\u030C", "◌ꜛ|ꜛ", "↗︎"]
      - ["˥˩", "◌̂|\u0302", "◌ꜜ|ꜜ", "↘"]
      - ["˦˥", "◌᷄|\u1DC4", "◌᷆|\u1DC6"]
