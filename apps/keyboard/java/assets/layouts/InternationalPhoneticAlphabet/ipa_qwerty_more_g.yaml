# This layout changes the script ⟨g⟩ (U+0261) and ⟨ᵍ⟩ (U+1DA2) used by the IPA
# to the ASCII ⟨g⟩ (U+0067) and its corresponding superscript ⟨ᵍ⟩ (U+1D4D).
#
name: QWERTY More (ASCII G)
numberRowMode: AlwaysDisabled # first row is the number row
autoShift: false # IPA is not bicameral
attributes:
  shiftable: false # prevent letters from being capitalised when pressing shift
  moreKeyMode: OnlyExplicit # prevent additional symbols from being added to long press list
rows:
  - letters: # X-SAMPA number row
    - type: case
      normal: [ɨ, "◌ᶤ|\u1DA4"]
      shifted: [ɸ, "!fixedColumnOrder!3", ɸʼ, pɸ, "◌ᶲ|\u1DB2"]
    - type: case
      normal: [ø, ø̞, "◌𐞢|\U000107A2"]
      shifted: [ə, "!fixedColumnOrder!4", ɘ, ɚ, "◌ᵊ|\u1D4A", "◌𐞎|\U0001078E"]
    - type: case
      normal: [ɜ, "!fixedColumnOrder!3", ɝ, ɞ, ɛ, "◌ᶟ|\u1D9F", "◌𐞏|\U0001078F", "◌ᵋ|\u1D4B"]
      shifted: [ʘ, "!fixedColumnOrder!3", ʘ̬, ʘ̃, "◌𐞵|\U000107B5"]
    - type: case
      normal: [ɾ, "!fixedColumnOrder!5", "◌𐞩|\U000107A9", ɿ, ʅ, ʮ, ʯ]
      shifted: [ǀ, "!fixedColumnOrder!5", ǁ̃, ǀ̃, ǁ, ǀ̬, ǁ̬, "◌𐞶|\U000107B6", ʇ, "◌𐞷|\U000107B7"]
    - type: case
      normal: [ɫ, "◌ꭞ|\uAB5E"]
      shifted: [ǃ, "!fixedColumnOrder!3", 𝼊, ‼, ψ, "◌𐞹|\U000107B9", "◌ꜝ|\uA71D"]
    - type: case
      normal: [ɐ, "◌ᵄ|\u1D44"]
      shifted: [ǂ, "!fixedColumnOrder!3", ǂ̬, ǂ̃, "◌𐞸|\U000107B8"]
    - type: case
      normal: [ɤ, ɤ̞, "◌𐞑|\U00010791"]
      shifted: [ɶ, "◌𐞣|\U000107A3"]
    - type: case
      normal: [ɵ, "!fixedColumnOrder!3", "◌ᶱ|\u1DB1"]
      shifted: [æ, "◌𐞃|\U00010783"]
    - type: case
      normal: [œ, "!fixedColumnOrder!3", "◌𐞣|\U000107A3", "◌ꟹ|\uA7F9", ɶ]
      shifted: [ʉ, "◌ᶶ|\u1DB6"]
    - type: case
      normal: [ʔ, "!fixedColumnOrder!8", "◌𐞳|\U000107B3", "◌𐞴|\U000107B4", "◌ˤ|\u02E4", "◌ˀ|\u02C0", ʡʼ, ʕ, ʢ, ʡ]
      shifted: [ʕ, "!fixedColumnOrder!5", "◌𐞳|\U000107B3", "◌𐞴|\U000107B4", "◌ˤ|\u02E4", ʡ, ʢ]
  - letters:
    - type: case
      normal: [q, "!fixedColumnOrder!3", qʼ, ʠ, "◌𐞥|\U000107A5"]
      shifted: [ɒ, ɒ̈, "◌ᶛ|\u1D9B"]
    - type: case
      normal: [w, ʍ, "◌ʷ|\u02B7", "◌ꭩ|\uAB69"]
      shifted: [ʍ, "◌ꭩ|\uAB69"]
    - type: case
      normal: [e, "!fixedColumnOrder!5", ɛ, ə, ɘ, e̞, ɚ, "◌ᵊ|\u1D4A", "◌ᵋ|\u1D4B", "◌𐞎|\U0001078E"]
      shifted: [ɛ, "◌ᵋ|\u1D4B"]
    - type: case
      normal: [
        r, "!fixedColumnOrder!7",
        ʁ, ɻ, ɽ, ɹ, ɺ, ʀ, ɾ,
        d̠ɹ̠˔, dɹ̝, ɿ, tɹ̝̊, t̠ɹ̠̊˔, "◌˞|\u02DE", "𝼈",
        "◌ʳ|\u02B3", "◌ʶ|\u02B6", "◌ʵ|\u02B5", "◌𐞨|\U000107A8", "◌ʴ|\u02B4", "◌𐞦|\U000107A6", "◌𐞪|\U000107AA",
        "◌𐞩|\U000107A9", "◌𐞧|\U000107A7"
      ]
      shifted: [ʁ, "!fixedColumnOrder!3", "◌ʶ|\u02B6", ʀ, "◌𐞪|\U000107AA"]
    - type: case
      normal: [
        t, "!fixedColumnOrder!7",
        tʃ, θʼ, tʼ, ʈ, θ, ʈʼ, ts,
        t̠ɹ̠̊˔, ʈɭ̊˔, tɬ, tɕ, t̪θ, ʈʂ, tɹ̝̊,
        "◌ᶿ|\u1DBF", tɬʼ, tsʼ, t̠ʃʼ, ʈʂʼ, "◌ᵗ|\u1D57", "◌𐞯|\U000107AF",
        "◌𐞬|\U000107AC", "◌𐞮|\U000107AE", "◌𐞭|\U000107AD", "◌𐞫|\U000107AB",
      ]
      shifted: [θ, "!fixedColumnOrder!3", "◌ᶿ|\u1DBF", θʼ, t̪θ]
    - type: case
      normal: [
        y, "!fixedColumnOrder!5",
        cʎ̝̊, ʎ, ʏ, cʎ̝̊ʼ, 𝼆,
        "◌ʸ|\u02B8", "◌𐞠|\U000107A0", "◌𐞲|\U000107B2", "◌𐞡|\U000107A1"
      ]
      shifted: [ʏ, "◌𐞲|\U000107B2"]
    - type: case
      normal: [u, "!fixedColumnOrder!3", ʊ̈, ʉ, ʊ, "◌ᵘ|\u1D58", "◌ᶶ|\u1DB6", "◌ᶷ|\u1DB7"]
      shifted: [ʊ, ʊ̈, "◌ᶷ|\u1DB7"]
    - type: case
      normal: [i, "!fixedColumnOrder!3", ɨ, ɪ, ɪ̈, "◌ᶤ|\u1DA4", "◌ᶦ|\u1DA6", "◌ⁱ|\u2071"]
      shifted: [ɪ, ɪ̈, "◌ᶦ|\u1DA6"]
    - type: case
      normal: [o, "!fixedColumnOrder!4", "◌ᵓ|\u1D53", "◌ᵒ|\u1D52", o̞, ɔ]
      shifted: [ɔ, "!fixedColumnOrder!3", "◌𐞵|\U000107B5", "◌ᵓ|\u1D53", ʘ]
    - type: case
      normal: [p, "!fixedColumnOrder!7", "◌ᶲ|\u1DB2", "◌ᵖ|\u1d56", p̪f, pɸ, ɸʼ, pʼ, ɸ]
      shifted: [ʋ, "◌ᶹ|\u1DB9"]
  - letters:
    - type: case
      normal: [
        a, "!fixedColumnOrder!6",
        æ, ä, ɒ, ɑ, ɒ̈, ɐ,
        "◌𐞃|\U00010783", "◌ᵃ|\u1D44", "◌ᶛ|\u1D9B", "◌ᵅ|\u1D45", "◌ᵄ|\u1D44"
      ]
      shifted: [ɑ, "◌ᵅ|\u1D45"]
    - type: case
      normal: [
        s, "!fixedColumnOrder!6",
        ʃ, ʂ, ɕ, sʼ, ʂʼ, ɕʼ,
        ʈʂ, ʃʼ, ts, tʃ, tsʼ, ʈʂʼ,
        ʆ, t̠ʃʼ, ʅ, "◌ᶴ|\u1DB4", "◌ˢ|\u02E2", "◌ᶳ|\u1DB3",
        "◌ᶝ|\u1D9D", "◌𐞬|\U000107AC", "◌𐞮|\U000107AE", "◌𐞭|\U000107AD", "◌𐞫|\U000107AB"
      ]
      shifted: [ʃ, "!fixedColumnOrder!7", t̠ʃʼ, ʃʼ, tʃ, ʅ, ʆ, "◌ᶴ|\u1DB4", "◌𐞮|\U000107AE"]
    - type: case
      normal: [
        d, "!fixedColumnOrder!7",
        ᶑ̥, ð, ɖ, ɗ, ɗ̥, ᶑ, d̪ð,
        dɹ̝, dʒ, dɮ, dz, dʑ, d̠ɹ̠˔, ɖʐ,
        "◌ᵈ|\u1D48", "◌ᶞ|\u1D9E", "◌𐞋|\U0001078B", "◌𐞌|\U0001078C", "◌𐞍|\U0001078D", "◌𐞇|\U00010787", "◌𐞊|\U0001078A",
        "◌𐞈|\U00010788", "◌𐞉|\U00010789"
      ]
      shifted: [ð, d̪ð, "◌ᶞ|\u1D9E"]
    - type: case
      normal: [f, "!fixedColumnOrder!3", "◌ᶠ|\u1DA0", fʼ, p̪f]
      shifted: [ɱ, "◌ᶬ|\u1DAC"]
    - type: case
      normal: [
        g, "!fixedColumnOrder!5",
        ɠ̊, ɢ, ɠ, ɣ, ʛ,
        "◌ᵍ|\u1D4D", gʟ̝, ʛ̥, gɣ, "◌ˠ|\u02E0",
        "◌𐞓|\U00010793", "◌𐞒|\U00010792", "◌𐞔|\u00010794"
      ]
      shifted: [ɣ, "!fixedColumnOrder!7", "◌𐞔|\u00010794", "◌𐞒|\U00010792", "◌ˠ|\u02E0", ʛ̥, ɢ, ʛ, gɣ]
    - type: case
      normal: [
        h, "!fixedColumnOrder!7",
        "◌ʰ|\u02B0", ʔh, ʜ, ɥ, ɦ, ɧ, ħ,
        "◌𐞖|\U00010796", "◌ᶣ|\u1DA3", "◌ʱ|\u02B1", "◌𐞗|\U00010797", "◌𐞕|\U00010795"
      ]
      shifted: [ɥ, "!fixedColumnOrder!3", "◌ᶣ|\u1DA3", ʜ, "◌𐞖|\U00010796"]
    - type: case
      normal: [
        j, "!fixedColumnOrder!6",
        "◌ʲ|\u02B2", ɟʝ, ʄ, ʝ, ɟ, ʄ̊,
        "◌𐞘|\U00010798", "◌ᶨ|\u1DA8", "◌ᶡ|\u1DA1"
      ]
      shifted: [ɲ, "!fixedColumnOrder!3", ȵ, ɟ, ʄ, "◌ᶮ|\u1DAE", "◌ᶡ|\u1DA1", "◌𐞘|\U00010798"]
    - type: case
      normal: [
        k, "!fixedColumnOrder!7",
        "◌ˣ|\u02E3", kʟ̝̊ʼ, kʟ̝̊, kx, kʼ, ɧ, ʞ,
        "◌𐞗|\U00010797", "◌ᵏ|\u1D4F",
      ]
      shifted: [
        ɬ, "!fixedColumnOrder!7",
        𝼅, ꞎ, tɬʼ, dɮ, tɬ, ɮ, ɬʼ,
        "◌𐞟|\U0001079F", "◌𐞝|\U0001079D", "◌𐞞|\U0001079E", "◌𐞛|\U0001079B"
      ]
    - type: case
      normal: [
        l, "!fixedColumnOrder!5",
        ʟ, ɮ, ɬ, ɺ, ɭ,
        ʈɭ̊˔, dɮ, tɬ, ɬʼ, ȴ,
        "◌ˡ|\u02E1", kʟ̝̊ʼ, tɬʼ, gʟ̝, kʟ̝̊,
        "◌𐞛|\U0001079B", ꞎ, 𝼅, 𝼆, 𝼄,
        "◌𐞞|\U0001079E", "◌𐞝|\U0001079D", "◌𐞟|\U0001079F", "◌𐞡|\U000107A1", "◌𐞜|\U0001079C",
        "◌ᶫ|\u1DAB",
      ]
      shifted: [ʎ, "!fixedColumnOrder!6", "◌𐞠|\U000107A0", "◌ᶫ|\u1DAB", gʟ̝, kʟ̝̊, cʎ̝̊, ʟ]
  - letters:
    - $shift
    - type: case
      normal: [
        z, "!fixedColumnOrder!5",
        ʒ, ʐ, ʑ, ʓ, dz,
        dʒ, ɖʐ, dʑ, dʓ, "◌ᶻ|\u1DBB",
        "◌ᶾ|\u1DBE", "◌ᶼ|\u1DBC", "◌ᶽ|\u1DBD", "◌𐞇|\U00010787", "◌𐞊|\U0001078A",
        "◌𐞈|\U00010788", "◌𐞉|\U00010789"
      ]
      shifted: [ʒ, "!fixedColumnOrder!5", dʓ, dʒ, ʓ, "◌ᶾ|\u1DBE", "◌𐞊|\U0001078A"]
    - type: case
      normal: [
        x, "!fixedColumnOrder!7",
        xʼ, ɧ, χ, χʼ, "◌ˣ|\u02E3", "◌𐞗|\U00010797", "◌ᵡ|\u1D61"
      ]
      shifted: [χ, "!fixedColumnOrder!4", "◌𐞕|\U00010795", ħ, χʼ, "◌ᵡ|\u1D61"]
    - type: case
      normal: [
        c, "!fixedColumnOrder!4",
        cʼ, ɕ, ç, ɕʼ,
        tɕ, cç, cʎ̝̊, cʎ̝̊ʼ,
        "◌ᶜ|\u1D9C", "◌ᶝ|\u1D9D", "◌ᶜ̧|\u1D9C\u0327", "◌𐞫|\U000107AB"
      ]
      shifted: [ç, "!fixedColumnOrder!6", cç, ɕ, tɕ, "◌ᶜ̧|\u1D9C\u0327", "◌ᶝ|\u1D9D", "◌𐞫|\U000107AB"]
    - type: case
      normal: [v, "!fixedColumnOrder!4", ⱱ, ʋ, ʌ, b̪v, "◌𐞰|\U000107B0", "◌ᶹ|\u1DB9", "◌ᶺ|\u1DBA", "◌ᵛ|\u1D5B"]
      shifted: [ʌ, "◌ᶺ|\u1DBA"]
    - type: case
      normal: [
        b, "!fixedColumnOrder!6",
        b̪v, bβ, ʙ, ɓ, β, ɓ̥,
        "◌ᵇ|\u1D47", "◌𐞄|\U00010784", "◌𐞅|\U00010785", "◌ᵝ|\u1D5D"
      ]
      shifted: [β, "!fixedColumnOrder!4", "◌𐞄|\U00010784", "◌ᵝ|\u1D5D", ʙ, bβ]
    - type: case
      normal: [
        n, "!fixedColumnOrder!6",
        "◌ⁿ|\u207F", ȵ, ŋ, ɳ, ɲ, ɴ,
        "◌ᵐ|\u1D50", "◌ᶬ|\u1DAC", "◌ᶯ|\u1DAF", "◌ᶮ|\u1DAE", "◌ᵑ|\u1D51", "◌ᶰ|\u1DB0"
      ]
      shifted: [ŋ, ɴ]
    - type: case
      normal: [
        m, "!fixedColumnOrder!4",
        ɯ̽, ɰ, ɱ, ɯ,
        "◌ᶭ|\u1DAD", "◌ᵚ|\u1D5A", "◌ᵐ|\u1D50", "◌ᶬ|\u1DAC"
      ]
      shifted: [ɯ, "!fixedColumnOrder!4", "◌ᶭ|\u1DAD", "◌ᵚ|\u1D5A", ɰ, ɯ̽]
