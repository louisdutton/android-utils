  - bottom:
    - {
        type: base,
        spec: "/[{|!code/key_to_alt_0_layout",
        attributes:
          &functional {
            width: FunctionalKey,
            style: Functional,
            anchored: true,
            showPopup: false,
            labelFlags: { followKeyLetterRatio: false }
