name: Publish Essentials repository

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish-essentials-repository.yml"
      - "apps/store/**"
      - "scripts/build-store-android.sh"
      - "scripts/build-store-repository.py"
      - "signing/**"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: essentials-pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262

      - name: Set up Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: apps/store/**/*.gradle*

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407

      - name: Install build dependencies
        shell: bash
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0"
          sudo apt-get update
          sudo apt-get install --yes minisign
          curl --fail --silent --show-error --location \
            --output "$RUNNER_TEMP/sops" \
            https://github.com/getsops/sops/releases/download/v3.13.2/sops-v3.13.2.linux.amd64
          echo "154dfe4cd70554bdd82b98e4cd4acf191d43d01ead6f00a73477aa44c4ac42ef  $RUNNER_TEMP/sops" \
            | sha256sum --check
          chmod +x "$RUNNER_TEMP/sops"

      - name: Decrypt signing material
        shell: bash
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          "$RUNNER_TEMP/sops" --decrypt --output-type binary \
            signing/essentials-store.keystore.sops.json \
            > "$RUNNER_TEMP/essentials-store.keystore"
          "$RUNNER_TEMP/sops" --decrypt --output-type binary \
            signing/store-password.sops.json \
            > "$RUNNER_TEMP/store-password.txt"
          "$RUNNER_TEMP/sops" --decrypt --output-type binary \
            signing/apps.0.sec.sops.json \
            > "$RUNNER_TEMP/apps.0.sec"
          chmod 600 \
            "$RUNNER_TEMP/essentials-store.keystore" \
            "$RUNNER_TEMP/store-password.txt" \
            "$RUNNER_TEMP/apps.0.sec"

      - name: Build signed Store
        shell: bash
        run: |
          version_code="$(git rev-list --count HEAD)"
          store_password="$(tr -d '\r\n' < "$RUNNER_TEMP/store-password.txt")"
          repo_public_key="$(sed -n '2p' signing/apps.0.pub)"
          ESSENTIALS_REPO_BASE_URL="https://louisdutton.github.io/android-utils" \
          ESSENTIALS_REPO_PUBLIC_KEY="$repo_public_key" \
          ESSENTIALS_REPO_KEY_VERSION=0 \
          ESSENTIALS_STORE_VERSION_CODE="$version_code" \
          ESSENTIALS_STORE_VERSION_NAME="0.1.$version_code" \
          ESSENTIALS_STORE_KEYSTORE_FILE="$RUNNER_TEMP/essentials-store.keystore" \
          ESSENTIALS_STORE_KEYSTORE_PASSWORD="$store_password" \
          ESSENTIALS_STORE_KEY_ALIAS=essentials-store \
          ESSENTIALS_STORE_KEY_PASSWORD="$store_password" \
            ./scripts/build-store-android.sh :app:assembleRelease --no-daemon

      - name: Build signed repository
        shell: bash
        run: |
          ./scripts/build-store-repository.py \
            --private-key "$RUNNER_TEMP/apps.0.sec" \
            --public-key signing/apps.0.pub \
            --config apps/store/repository-packages.toml \
            --output "$RUNNER_TEMP/repository" \
            apps/store/app/build/outputs/apk/release/app-release.apk
          cp apps/store/pages/index.html "$RUNNER_TEMP/repository/index.html"

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa
        with:
          path: ${{ runner.temp }}/repository

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
